name: Update public data

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-embalses-db
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Update data artifacts
        env:
          AEMET_API_KEY: ${{ secrets.AEMET_API_KEY }}
        run: npm run data:update:scheduled

      - name: Print summary
        run: npm run data:summary

      - name: Show artifact status
        run: |
          git status --short
          if [ -f data/embalses.db ]; then
            sha256sum data/embalses.db
            du -h data/embalses.db
          fi
          if [ -f data/cache/aemet-recent-climate-30.json ]; then
            sha256sum data/cache/aemet-recent-climate-30.json
            du -h data/cache/aemet-recent-climate-30.json
          fi
          monthly_count=$(find data/cache -maxdepth 1 -type f -name 'aemet-monthly-*.json' | wc -l)
          echo "monthly cache files: ${monthly_count}"

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/embalses.db data/cache/
          git status --short
          git diff --cached --stat
          git commit -m "chore: refresh embalses and AEMET cache" || exit 0
          git push
